<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Trip Planner · Plan your city adventure</title>
  <meta name="description" content="A fun, city-vibes vacation planner — track your itinerary, flights, accommodations, reservations, ticketed events and budget. Reuse the template for every trip." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%BC%3C/text%3E%3C/svg%3E" />
  <!-- PWA: installable + offline -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trip Planner" />
  <!-- ?v= is a cache-buster: bump it whenever styles.css or app.js change. -->
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <!-- Decorative dusk sky with a Tokyo/Fukuoka city skyline along the bottom -->
  <div class="sky" aria-hidden="true">
    <span class="moon"></span>
    <span class="star s1"></span>
    <span class="star s2"></span>
    <span class="star s3"></span>
    <span class="star s4"></span>
    <span class="star s5"></span>
    <svg class="skyline" viewBox="0 0 1440 150" preserveAspectRatio="none">
      <!-- Mt Fuji, faint in the distance -->
      <path class="fuji" d="M250,150 L410,42 L570,150 Z"></path>
      <path class="fuji-snow" d="M372,68 L410,42 L448,68 L433,62 L421,72 L410,58 L399,72 L387,62 Z"></path>
      <!-- back skyline (depth) -->
      <path class="sky-back" d="M0,150 L0,116 L70,116 L70,128 L150,128 L150,104 L220,104 L220,122 L300,122 L300,110 L380,110 L380,126 L470,126 L470,100 L540,100 L540,124 L640,124 L640,112 L900,112 L900,120 L1000,120 L1000,106 L1080,106 L1080,124 L1180,124 L1180,114 L1280,114 L1280,122 L1360,122 L1360,110 L1440,110 L1440,150 Z"></path>
      <!-- front skyline: ground strip + buildings -->
      <path class="sky-front" d="M0,150 L0,128 L1440,128 L1440,150 Z"></path>
      <path class="sky-front" d="M40,128 L40,96 L112,96 L112,128 Z"></path>
      <path class="sky-front" d="M150,128 L150,66 L214,66 L214,128 Z"></path>
      <path class="sky-front" d="M270,128 L270,104 L338,104 L338,128 Z"></path>
      <path class="sky-front" d="M400,128 L400,84 L466,84 L466,128 Z"></path>
      <path class="sky-front" d="M540,128 L540,58 L602,58 L602,128 Z"></path>
      <path class="sky-front" d="M720,128 L720,110 L890,110 L890,128 Z"></path>
      <path class="sky-front" d="M1180,128 L1180,90 L1252,90 L1252,128 Z"></path>
      <path class="sky-front" d="M1300,128 L1300,102 L1366,102 L1366,128 Z"></path>
      <!-- communications tower (Tokyo/Fukuoka Tower) -->
      <path class="tower" d="M1034,128 L1048,78 L1044,66 L1058,18 L1072,66 L1068,78 L1082,128 Z"></path>
      <rect class="tower" x="1040" y="84" width="36" height="7"></rect>
      <rect class="tower" x="1047" y="62" width="22" height="4"></rect>
      <!-- lit windows -->
      <g>
        <rect class="win-gold" x="548" y="70" width="6" height="7"></rect>
        <rect class="win-gold" x="560" y="70" width="6" height="7"></rect>
        <rect class="win-gold" x="548" y="84" width="6" height="7"></rect>
        <rect class="win-pink" x="560" y="84" width="6" height="7"></rect>
        <rect class="win-gold" x="548" y="98" width="6" height="7"></rect>
        <rect class="win-pink" x="160" y="78" width="6" height="7"></rect>
        <rect class="win-gold" x="172" y="78" width="6" height="7"></rect>
        <rect class="win-gold" x="160" y="94" width="6" height="7"></rect>
        <rect class="win-cyan" x="410" y="96" width="6" height="7"></rect>
        <rect class="win-gold" x="422" y="96" width="6" height="7"></rect>
        <rect class="win-gold" x="1054" y="92" width="5" height="6"></rect>
        <rect class="win-pink" x="1054" y="104" width="5" height="6"></rect>
      </g>
    </svg>
  </div>

  <div class="wrap">
    <header class="hd">
      <div class="hd-brand">
        <span class="hd-logo" aria-hidden="true">🗼</span>
        <div>
          <h1>Trip Planner</h1>
          <p class="hd-sub">Plan your city adventure 🏙️</p>
        </div>
      </div>

      <div class="hd-actions">
        <div class="trip-switch">
          <label class="sr-only" for="tripSelect">Choose a trip</label>
          <select id="tripSelect" class="trip-select" aria-label="Choose a trip"></select>
        </div>
        <button id="newTripBtn" class="btn primary" type="button">✈️ New trip</button>
        <button id="menuBtn" class="icon-btn" type="button" aria-label="Menu" aria-expanded="false" title="More">⚙️</button>
      </div>
    </header>

    <!-- Slide-down utility menu (save / load / theme / duplicate / delete) -->
    <section class="card menu-panel" id="menuPanel" hidden aria-label="Trip tools">
      <div class="menu-grid">
        <button type="button" id="duplicateTrip" class="data-btn">📑 Duplicate as template</button>
        <button type="button" id="shareTrip" class="data-btn">🔗 Share this trip</button>
        <button type="button" id="saveFile" class="data-btn">💾 Back up all trips</button>
        <label class="data-btn">📂 Restore from file<input type="file" id="loadData" accept="application/json,.json" hidden /></label>
        <button type="button" id="printBtn" class="data-btn">🖨️ Print / Save PDF</button>
        <button type="button" id="themeToggle" class="data-btn">🌙 Dark mode</button>
        <button type="button" id="deleteTrip" class="data-btn danger">🗑️ Delete this trip</button>
      </div>
      <p class="menu-msg" id="menuMsg" role="status"></p>
    </section>

    <!-- Trip hero: name, destination, dates, countdown -->
    <section class="hero card" id="hero" aria-label="Trip summary"></section>

    <!-- Tab navigation -->
    <nav class="tabs" id="tabs" aria-label="Sections">
      <button class="tab active" data-view="overview" type="button"><span>🧭</span> Overview</button>
      <button class="tab" data-view="flights" type="button"><span>✈️</span> Flights</button>
      <button class="tab" data-view="hotels" type="button"><span>🏨</span> Accommodations</button>
      <button class="tab" data-view="itinerary" type="button"><span>🗓️</span> Itinerary</button>
      <button class="tab" data-view="packing" type="button"><span>🧳</span> Packing</button>
      <button class="tab" data-view="budget" type="button"><span>💰</span> Budget</button>
      <button class="tab" data-view="details" type="button"><span>📌</span> Details</button>
    </nav>

    <main id="main"><!-- rendered by app.js --></main>

    <footer class="ft">
      <p>Everything saves automatically on this device 🏮 Use <b>Back up all trips</b> to keep a copy or move to another device.</p>
    </footer>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js?v=5"></script>
</body>
</html>
