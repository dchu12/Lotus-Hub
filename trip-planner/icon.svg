<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="0.62" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.6" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fb923c"/>
    </radialGradient>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- sky + sea -->
    <rect x="0" y="0" width="512" height="512" fill="url(#sky)"/>
    <!-- sun -->
    <circle cx="356" cy="150" r="66" fill="url(#sun)"/>
    <!-- distant water shimmer lines -->
    <g stroke="#e0fbff" stroke-width="7" stroke-linecap="round" opacity="0.5">
      <line x1="150" y1="330" x2="230" y2="330"/>
      <line x1="300" y1="356" x2="392" y2="356"/>
      <line x1="120" y1="384" x2="196" y2="384"/>
    </g>
    <!-- sand -->
    <path d="M0,430 C120,398 200,452 300,438 C380,427 452,462 512,442 L512,512 L0,512 Z" fill="#fde68a"/>
    <path d="M0,452 C120,428 220,470 320,458 C400,449 460,476 512,462 L512,512 L0,512 Z" fill="#fcd34d" opacity="0.85"/>

    <!-- beach umbrella -->
    <g transform="translate(196 250)">
      <rect x="-6" y="0" width="12" height="196" rx="6" fill="#3f2d1e"/>
      <path d="M0,-14 C-104,-14 -150,44 -150,44 L150,44 C150,44 104,-14 0,-14 Z" fill="#f43f5e"/>
      <path d="M0,-14 C-52,-14 -84,44 -84,44 L-16,44 C-16,10 -8,-6 0,-14 Z" fill="#fff" opacity="0.92"/>
      <path d="M52,44 C52,10 40,-8 20,-13 C70,-8 100,20 108,44 Z" fill="#fff" opacity="0.92"/>
      <circle cx="0" cy="-16" r="10" fill="#fb923c"/>
    </g>
  </g>
</svg>
