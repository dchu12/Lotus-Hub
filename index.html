<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Lotus Hub</title>
  <link rel="stylesheet" href="styles.css?v=21" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon-64.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <h1 class="wordmark" aria-label="Lotus Hub"><img class="brand-logo" src="logo.png" alt="" width="38" height="38" /> Lotus Hub</h1>
        <div class="brand-actions">
          <button class="profile-icon-btn" id="profile-btn" aria-label="Your profile" title="Profile" hidden>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </button>
        </div>
      </div>
      <nav class="tabs" id="tabs" hidden>
        <button class="tab" data-view="coaching">Practice</button>
        <button class="tab active" data-view="discover">Play</button>
        <button class="tab" data-view="connect">Connect</button>
      </nav>
    </header>

    <div id="setup-banner" class="banner" hidden></div>

    <main id="main"><!-- rendered by app.js --></main>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast" hidden></div>

  <!-- Firebase SDK (compat). App shows a setup screen if config/keys are missing. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=1"></script>
  <script src="firebase.js?v=24"></script>
  <script src="app.js?v=24"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
