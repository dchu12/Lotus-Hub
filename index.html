<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Lotus Hub</title>
  <link rel="stylesheet" href="styles.css?v=48" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon-64.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <h1 class="wordmark" aria-label="Lotus Hub"><img class="brand-logo" src="logo.png" alt="" width="38" height="38" /> Lotus Hub</h1>
        <div class="brand-actions">
          <a class="ig-btn" id="ig-link" href="https://www.instagram.com/lotuspickleballacademy_?igsh=MXV2NjEyNng5bXY0bA==" target="_blank" rel="noopener noreferrer" aria-label="Lotus Pickleball Academy on Instagram" title="Instagram">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
        </div>
      </div>
    </header>

    <div id="setup-banner" class="banner" hidden></div>

    <main id="main"><!-- rendered by app.js --></main>

    <nav class="tabbar" id="tabs" hidden>
      <button class="tab" data-view="profile"><span class="tab-ico">👤</span><span class="tab-lbl">Profile</span></button>
      <button class="tab" data-view="coaching"><span class="tab-ico">🎯</span><span class="tab-lbl">Practice</span></button>
      <button class="tab active" data-view="discover"><span class="tab-ico">🏓</span><span class="tab-lbl">Play</span></button>
      <button class="tab" data-view="connect"><span class="tab-ico">👥</span><span class="tab-lbl">Connect</span></button>
      <button class="tab" data-view="rank"><span class="tab-ico">🏆</span><span class="tab-lbl">Rank</span></button>
    </nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast" hidden></div>

  <!-- Firebase SDK (compat). App shows a setup screen if config/keys are missing. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
  <script src="firebase-config.js?v=1"></script>
  <script src="firebase.js?v=35"></script>
  <script src="app.js?v=48"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // Auto-update: reload once when a new service worker takes control so the
      // latest version shows on open without a manual refresh.
      var lhRefreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (lhRefreshing) return;
        lhRefreshing = true;
        window.location.reload();
      });
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("sw.js")
          .then(function (reg) { reg.update(); })
          .catch(function () {});
      });
    }
  </script>
</body>
</html>
