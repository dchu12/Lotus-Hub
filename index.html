<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Lotus Hub</title>
  <link rel="stylesheet" href="styles.css?v=27" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon-64.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <h1 class="wordmark" aria-label="Lotus Hub"><img class="brand-logo" src="logo.png" alt="" width="38" height="38" /> Lotus Hub</h1>
        <div class="brand-actions">
          <button class="host-btn" id="host-btn" aria-label="Host an open play" title="Host an open play" hidden>
            <svg width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
              <circle cx="20" cy="20" r="18" fill="#f5c400" stroke="#c99a00" stroke-width="1.5"></circle>
              <circle cx="20" cy="8" r="1.6" fill="#fffbe8"></circle>
              <circle cx="10" cy="14" r="1.6" fill="#fffbe8"></circle>
              <circle cx="30" cy="14" r="1.6" fill="#fffbe8"></circle>
              <circle cx="11" cy="27" r="1.6" fill="#fffbe8"></circle>
              <circle cx="29" cy="27" r="1.6" fill="#fffbe8"></circle>
              <path d="M20 13.5 V26.5 M13.5 20 H26.5" stroke="#c01f2c" stroke-width="3" stroke-linecap="round"></path>
            </svg>
          </button>
          <a class="ig-btn" id="ig-link" href="https://www.instagram.com/lotuspickleballacademy_?igsh=MXV2NjEyNng5bXY0bA==" target="_blank" rel="noopener noreferrer" aria-label="Lotus Pickleball Academy on Instagram" title="Instagram">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
          <button class="profile-icon-btn" id="profile-btn" aria-label="Your profile" title="Profile" hidden>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </button>
        </div>
      </div>
    </header>

    <div id="setup-banner" class="banner" hidden></div>

    <main id="main"><!-- rendered by app.js --></main>

    <nav class="tabbar" id="tabs" hidden>
      <button class="tab" data-view="coaching"><span class="tab-ico">🎯</span><span class="tab-lbl">Practice</span></button>
      <button class="tab active" data-view="discover"><span class="tab-ico">🏓</span><span class="tab-lbl">Play</span></button>
      <button class="tab" data-view="connect"><span class="tab-ico">👥</span><span class="tab-lbl">Connect</span></button>
      <button class="tab" data-view="rank"><span class="tab-ico">🏆</span><span class="tab-lbl">Rank</span></button>
    </nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast" hidden></div>

  <!-- Firebase SDK (compat). App shows a setup screen if config/keys are missing. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=1"></script>
  <script src="firebase.js?v=24"></script>
  <script src="app.js?v=28"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
