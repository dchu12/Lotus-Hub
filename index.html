<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Lotus Hub</title>
  <link rel="stylesheet" href="styles.css?v=6" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon-64.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <h1 class="wordmark" aria-label="Lotus Hub"><img class="brand-logo" src="logo.png" alt="" width="38" height="38" /> Lotus Hub</h1>
        <div class="brand-actions">
          <div class="menu-wrap">
            <button class="gear-btn" id="settings-btn" aria-label="Settings" title="Settings" aria-haspopup="true" aria-expanded="false" hidden>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <div class="menu" id="settings-menu" role="menu" hidden>
              <button class="menu-item" data-action="profile" role="menuitem">Profile</button>
              <button class="menu-item menu-item-danger" data-action="signout" role="menuitem">Sign out</button>
            </div>
          </div>
        </div>
      </div>
      <nav class="tabs" id="tabs" hidden>
        <button class="tab active" data-view="discover">Open Play</button>
        <button class="tab" data-view="create">Host</button>
        <button class="tab" data-view="coaching">Coaching</button>
      </nav>
    </header>

    <div id="setup-banner" class="banner" hidden></div>

    <main id="main"><!-- rendered by app.js --></main>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast" hidden></div>

  <!-- Firebase SDK (compat). App shows a setup screen if config/keys are missing. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=1"></script>
  <script src="firebase.js?v=1"></script>
  <script src="app.js?v=6"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
